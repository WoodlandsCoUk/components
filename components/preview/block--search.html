

<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Search: Default | Component Library</title>

    <script>
        document.getElementsByTagName('html')[0].className += ' js';
    </script>

    <link media="all" rel="stylesheet" href="../../css/site.css" />
</head>
<body>

    <form action="" method="post" class="form form--search">
    <div class="form__field">
        <label for="form__search_location" class="form__label">Location</label>
        <input type="text" class="form-input" id="form__search_location" name="location" placeholder="Enter location / postcode" />
    </div>

    <div class="form__field">
        <label for="form__search_type" class="form__label">Type</label>
        <select class="form-select" id="form__search_type" name="type">
          <option value="woodland">Woodland</option>
          <option value="mixed deciduous">Mixed Deciduous</option>
          <option value="coniferous">Coniferous</option>
          <option value="coppice">Coppice</option>
          <option value="ancient woodland">Ancient Woodland</option>
        </select>
    </div>

    <div class="form__field form__field--checkbox">
        <label for="form__search_sold" class="form__label">Show Sold</label>
        <input type="checkbox" class="form-checkbox" id="form__search_sold" name="sold" />
    </div>

    <button class="button button--green button--inline">
  <span>Search</span>
</button>

</form>


    <script src="../../js/manifest.js"></script>
    <script src="../../js/vendor.js"></script>
    <script src="../../js/site.js"></script>

</body>
</html>
