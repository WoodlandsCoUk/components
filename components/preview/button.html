

<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Buttons | Component Library</title>

    <script>
        document.getElementsByTagName('html')[0].className += ' js';
    </script>

    <link media="all" rel="stylesheet" href="../../css/site.css" />
</head>
<body>

    <!-- Start: @button--default -->
<button class="button">
  <span>Default Button</span>
</button>
<!-- End: @button--default -->

<!-- Start: @button--red -->
<button class="button button--red">
  <span>Red Button</span>
</button>
<!-- End: @button--red -->

<!-- Start: @button--red--outline -->
<button class="button button--red button--red--outline">
  <span>Red Button</span>
</button>
<!-- End: @button--red--outline -->

<!-- Start: @button--green -->
<button class="button button--green">
  <span>Green Button</span>
</button>
<!-- End: @button--green -->

<!-- Start: @button--green--dark -->
<button class="button button--green-dark">
  <span>Dark Green Button</span>
</button>
<!-- End: @button--green--dark -->

<!-- Start: @button--green--outline -->
<button class="button button--green button--green--outline">
  <span>Green Button</span>
</button>
<!-- End: @button--green--outline -->

<!-- Start: @button--yellow -->
<button class="button button--yellow">
  <span>Yellow Button</span>
</button>
<!-- End: @button--yellow -->

<!-- Start: @button--yellow--outline -->
<button class="button button--yellow button--yellow--outline">
  <span>Yellow Button</span>
</button>
<!-- End: @button--yellow--outline -->

<!-- Start: @button--inline -->
<button class="button button--inline">
  <span>Inline Button</span>
</button>
<!-- End: @button--inline -->

<!-- Start: @button--inline-red -->
<button class="button button--inline button--red">
  <span>Inline Button</span>
</button>
<!-- End: @button--inline-red -->

<!-- Start: @button--inline-green -->
<button class="button button--inline button--green">
  <span>Inline Button</span>
</button>
<!-- End: @button--inline-green -->

<!-- Start: @button--inline-yellow -->
<button class="button button--inline button--yellow">
  <span>Inline Button</span>
</button>
<!-- End: @button--inline-yellow -->


    <script src="../../js/manifest.js"></script>
    <script src="../../js/vendor.js"></script>
    <script src="../../js/site.js"></script>

</body>
</html>
